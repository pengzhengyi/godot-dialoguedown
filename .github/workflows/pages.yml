name: Deploy Pages (docs + demo)

# Publish the DocFX documentation site to GitHub Pages on every merge to main,
# with the interactive visualization demo served under /demo/. Both are static —
# no server. The DocFX site (conceptual docs + C# API reference) is the site root.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege: grant nothing by default and elevate only where needed. The
# build job reads the repo; only the deploy job may publish to Pages.
permissions: {}

# Let one deploy finish before the next starts, but never cancel an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs + demo
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "8.0.x"

      - name: Restore local tools (DocFX)
        run: dotnet tool restore

      # The CLI embeds the committed dist/report.html (drift-checked by CI), so the
      # report template is already current — no npm build is needed for the demo.
      - name: Build the CLI
        run: dotnet build src/DialogueDown.Cli/DialogueDown.Cli.csproj -c Release

      # DocFX renders the conceptual docs and the C# API reference into docs/_site.
      - name: Build the docs site (DocFX)
        run: dotnet tool run docfx docs/docfx.json

      - name: Assemble the Pages site
        run: |
          mkdir -p site
          cp -r docs/_site/. site/
          mkdir -p site/demo
          cp docs/demo/index.html site/demo/index.html
          dotnet run --project src/DialogueDown.Cli -c Release --no-build -- \
            visualize examples/gallery.dialogue.md -o site/demo/gallery.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
