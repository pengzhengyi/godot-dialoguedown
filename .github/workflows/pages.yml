name: Deploy Pages demo

# Publish a live, read-only visualization report to GitHub Pages on every merge to
# main. The demo is a static export of examples/gallery.dialogue.md — no server.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege: grant nothing by default and elevate only where needed. The
# build job reads the repo; only the deploy job may publish to Pages.
permissions: {}

# Let one deploy finish before the next starts, but never cancel an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Render demo site
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      # The CLI embeds the committed dist/report.html (drift-checked by CI), so the
      # report template is already current — no npm build is needed here.
      - name: Build the CLI
        run: dotnet build src/DialogueDown.Cli/DialogueDown.Cli.csproj -c Release

      - name: Assemble the site
        run: |
          mkdir -p site
          cp docs/pages/index.html site/index.html
          dotnet run --project src/DialogueDown.Cli -c Release --no-build -- \
            visualize examples/gallery.dialogue.md -o site/gallery.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
