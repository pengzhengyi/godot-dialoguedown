name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  dotnet:
    name: .NET
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore DialogueSystem.sln

      - name: Build
        run: dotnet build DialogueSystem.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test DialogueSystem.sln --configuration Release --no-build
