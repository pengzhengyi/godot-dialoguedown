name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dotnet:
    name: .NET
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore DialogueDown.sln

      - name: Build
        run: dotnet build DialogueDown.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test DialogueDown.sln --configuration Release --no-build

      - name: Restore local tools
        run: dotnet tool restore

      - name: Collect coverage
        run: >
          dotnet test DialogueDown.sln
          --settings coverage.runsettings
          --collect:"XPlat Code Coverage"

      - name: Generate coverage report
        run: >
          dotnet reportgenerator
          "-reports:tests/**/TestResults/**/coverage.cobertura.xml"
          "-targetdir:coverage-report"
          "-reporttypes:Html;MarkdownSummaryGithub;Cobertura"

      - name: Check coverage threshold
        run: |
          python3 - <<'PY'
          import sys
          import xml.etree.ElementTree as ET

          root = ET.parse("coverage-report/Cobertura.xml").getroot()
          line_rate = float(root.attrib["line-rate"]) * 100
          print(f"Line coverage: {line_rate:.2f}%")

          if line_rate < 90:
              raise SystemExit("Line coverage is below the 90% required floor.")

          if line_rate < 100:
              print(
                  f"::warning::Line coverage is {line_rate:.2f}%; "
                  "100% is the aspirational target."
              )
          PY

      - name: Add coverage summary
        run: cat coverage-report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-report

  frontend_quality:
    name: Frontend quality
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/DialogueDown.Visualization/web

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/DialogueDown.Visualization/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check (typecheck, lint, style, format, unit tests)
        run: npm run check

      - name: Build single-file report
        run: npm run build

      - name: Verify the committed report and launcher are in sync with web/ sources
        run: git diff --exit-code -- dist/report.html dist/launcher.html

  frontend_static:
    name: Frontend static E2E
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/DialogueDown.Visualization/web

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/DialogueDown.Visualization/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps --only-shell chromium

      - name: End-to-end tests (Playwright, static)
        run: npm run e2e

  frontend_live:
    name: Frontend live E2E
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/DialogueDown.Visualization/web

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/DialogueDown.Visualization/web/package-lock.json

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "8.0.x"

      - name: Prepare live E2E
        shell: bash
        run: |
          set -euo pipefail

          npm run build:cli &
          cli_build_pid=$!

          (
            npm ci
            npx playwright install --with-deps --only-shell chromium
          ) &
          provision_pid=$!

          cleanup() {
            local status=$?
            trap - EXIT INT TERM
            kill "$cli_build_pid" "$provision_pid" 2>/dev/null || true
            wait "$cli_build_pid" "$provision_pid" 2>/dev/null || true
            exit "$status"
          }
          trap cleanup EXIT
          trap 'exit 130' INT
          trap 'exit 143' TERM

          wait -n "$cli_build_pid" "$provision_pid" || exit $?
          wait "$cli_build_pid"
          wait "$provision_pid"
          trap - EXIT INT TERM

      - name: End-to-end tests (Playwright, live server)
        run: npx playwright test --config playwright.live.config.ts

  frontend:
    name: Frontend
    if: always()
    needs: [frontend_quality, frontend_static, frontend_live]
    runs-on: ubuntu-latest

    steps:
      - name: Verify every frontend lane passed
        env:
          QUALITY_RESULT: ${{ needs.frontend_quality.result }}
          STATIC_RESULT: ${{ needs.frontend_static.result }}
          LIVE_RESULT: ${{ needs.frontend_live.result }}
        run: |
          test "$QUALITY_RESULT" = "success"
          test "$STATIC_RESULT" = "success"
          test "$LIVE_RESULT" = "success"
